name: commit convention

# Merges are squash-only and take the PR title, so the PR title IS the commit
# message that lands. Both are checked: the title because it is what ships,
# and each commit in the branch because a reviewer reads those.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check the PR title and every commit subject
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Conventional Commits, plus the subject length limit from CLAUDE.md.
          # No third-party action: this repository has no dependencies and its
          # CI does not need one either.
          pattern='^(feat|fix|perf|refactor|docs|test|build|ci|chore|revert)(\([a-z0-9._,-]+\))?!?: .+'
          failed=0

          check() {
            local kind="$1" subject="$2"
            if [ "${#subject}" -gt 72 ]; then
              echo "::error::$kind is ${#subject} characters, over the 72 limit: $subject"
              failed=1
            fi
            if ! printf '%s' "$subject" | grep -Eq "$pattern"; then
              echo "::error::$kind does not follow Conventional Commits: $subject"
              failed=1
            fi
          }

          check "PR title" "$PR_TITLE"
          while IFS= read -r subject; do
            [ -n "$subject" ] && check "commit subject" "$subject"
          done < <(git log --format=%s "$BASE_SHA..$HEAD_SHA")

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Expected: type(optional scope): subject"
            echo "Types:    feat fix perf refactor docs test build ci chore revert"
            echo "Example:  perf(overview): stream each card instead of screenshotting it"
            exit 1
          fi
          echo "All subjects follow the convention."
